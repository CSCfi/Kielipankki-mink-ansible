---

- name: Create Pouta VM
  tags: provision
  ansible.builtin.import_playbook: pouta-vm.yml

- name: Configure server
  hosts: mink
  become: true
  tags: setup
  tasks:
    - name: Set timezone
      community.general.timezone:
        name: "Europe/Helsinki"
        
    - name: "Add gunicorn group"
      ansible.builtin.group:
        name: gunicorn
        state: present

    - name: "Add gunicorn user"
      ansible.builtin.user:
        name: gunicorn
        state: present
        generate_ssh_key: yes
        group: gunicorn

    - name: "Add sparv user"
      ansible.builtin.user:
        name: sparv
        state: present
        generate_ssh_key: yes

    - name: "Collect gunicorn user's public key"
      ansible.builtin.slurp:
        src: /home/gunicorn/.ssh/id_rsa.pub
      register: gunicorn_ssh_pub

    - name: "Collect sparv user's public key"
      ansible.builtin.slurp:
        src: /home/sparv/.ssh/id_rsa.pub
      register: sparv_ssh_pub

    - name: "Authorize gunicorn to make ssh connections to localhost as sparv"
      ansible.builtin.authorized_key:
        user: sparv
        key: "{{ gunicorn_ssh_pub.content | b64decode }}"
        # This hop is always loopback (SPARV_HOST=localhost), so pin it there.
        key_options: 'from="127.0.0.1,::1"'
        state: present

    - name: "Require a pinned source IP before installing the Korp key"
      ansible.builtin.assert:
        that:
          - mink_source_ip is defined
          - mink_source_ip | string | length > 0
        fail_msg: >-
          mink_source_ip must be set (in this inventory) to the address the Korp host
          sees when Mink connects, so the sparv->mink@korp key can be locked to it.
          Use Mink's internal IP if it shares a Pouta project with Korp, otherwise its
          external/floating IP. See inventories/*/hosts.
      when: groups['korp'] is defined and groups['korp'] | length > 0

    - name: "Install sparv user's key in Korp"
      ansible.builtin.authorized_key:
        user: mink
        key: "{{ sparv_ssh_pub.content | b64decode }}"
        # Lock this key to the Mink machine's source IP so a leaked key cannot be
        # used from anywhere else. mink_source_ip is set per inventory.
        key_options: 'from="{{ mink_source_ip }}"'
        state: present
      delegate_to:
        "{{ item }}"
      loop: "{{ groups['korp'] | default([]) }}"
      when: groups['korp'] is defined and groups['korp'] | length > 0

    - name: "Ensure directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "u+rwx,g+rwxs,o+rx"
        owner: sparv
        group: gunicorn
      loop:
        - "{{ data_root }}"

    - name: "Install core packages"
      ansible.builtin.dnf:
        name:
          - git
          - gcc
          - pip
          - python3-virtualenv
          - python3-devel
          - unzip
          - perl
          
    - name: "Install dev packages"
      ansible.builtin.dnf:
        name:
          - ripgrep
          - emacs
          - vim
          
- name: Install software
  hosts: mink
  become: true
  handlers:
    - name: restart memcached
      ansible.builtin.systemd:
        name: memcached
        state: restarted
      notify: populate sparv-languages cache

    - name: populate sparv-languages cache
      ansible.builtin.command: >
        curl --unix-socket {{ mink_backend_socket_path }}
        "http://localhost/sparv-languages?annotators=true"
  roles:
    - role: apache
      tags: apache
    - role: sparv
      tags: sparv
    - role: mink-backend
      tags: mink-backend
    - role: mink-frontend
      tags: mink-frontend
    # - role: firewall
    #   tags: firewall
