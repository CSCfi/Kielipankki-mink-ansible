---

- name: Install packages
  ansible.builtin.dnf:
    name:
      - memcached
      - socat
      - sqlite
      - time

- name: Install systemd templates
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
  loop:
    - mink-backend.service
    - mink-backend.socket
    - mink-manager.service
    - socat.service

- name: Fetch repo
  ansible.builtin.git:
    repo: "{{ mink_backend_repo }}"
    version: "{{ mink_backend_version }}"
    dest: "{{ mink_backend_dir }}"
    umask: "0022"
  notify: restart mink-backend

- name: Install requirements
  ansible.builtin.pip:
    requirements: "{{ mink_backend_dir }}/requirements.txt"
    virtualenv: "{{ mink_backend_dir }}/venv"

- name: Create dirs
  ansible.builtin.file:
    state: directory
    path: "{{ mink_backend_dir }}/instance/logs"
    
- name: Install config
  ansible.builtin.template:
    src: config.py.j2
    dest: "{{ mink_backend_dir }}/instance/config.py"
  notify:
    - restart mink-backend
    - restart memcached

- name: Install auth public key
  ansible.builtin.copy:
    src: public_key.pem
    dest: "{{ mink_backend_dir }}/instance/keys/public_key.pem"

- name: start services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - mink-backend
    - mink-manager
    - socat
# Regenerate the durable Sparv capability listings on every deploy. This queries
# the Sparv host over SSH and writes the JSON files the backend reads, so the
# create-corpus view is instant and correct regardless of memcached. Sparv's
# offerings only change on deploy, so generating here (rather than per request or
# per boot) is exactly right. Runs as gunicorn (whose key may reach the Sparv
# host) after the Sparv role earlier in the play has installed the pipeline.
# Independent of the running backend: the script boots its own app context.
- name: Generate Sparv capability listings
  ansible.builtin.command: "{{ mink_backend_dir }}/venv/bin/python generate_capabilities.py"
  args:
    chdir: "{{ mink_backend_dir }}"
  become: true
  become_user: gunicorn
  changed_when: true

